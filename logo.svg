<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep space purple -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#1A0E3A"/>
      <stop offset="50%" stop-color="#221452"/>
      <stop offset="100%" stop-color="#3D1A8A"/>
    </linearGradient>
    <!-- Subtle border shimmer: gold to purple -->
    <linearGradient id="border-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE088" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#BB86FC" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6C3FA0" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Text gradient: white to soft gold -->
    <linearGradient id="text-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="65%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE8B8"/>
    </linearGradient>
    <!-- Ambient glow behind text -->
    <radialGradient id="glow" cx="0.5" cy="0.48" r="0.38">
      <stop offset="0%" stop-color="#BB86FC" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#BB86FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="92" ry="92" fill="url(#bg-grad)"/>
  <!-- Inner glow -->
  <rect x="0" y="0" width="512" height="512" rx="92" ry="92" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="2" y="2" width="508" height="508" rx="90" ry="90" fill="none" stroke="url(#border-grad)" stroke-width="2"/>
  <!-- DAS text -->
  <text x="256" y="286" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif"
        font-weight="700" font-size="168" letter-spacing="-2"
        fill="url(#text-grad)">DAS</text>
</svg>
